naftiko: 1.0.0-alpha2
info:
  label: SEON API — Fraud
  description: 'SEON API — Fraud. 1 operations. Lead operation: Submit a fraud evaluation request. Self-contained Naftiko
    capability covering one Seon Docs business surface.'
  tags:
  - Seon Docs
  - Fraud
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEON_DOCS_API_KEY: SEON_DOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: seon-docs-fraud
    baseUri: https://api.seon.io
    description: SEON API — Fraud business capability. Self-contained, no shared references.
    resources:
    - name: SeonRestService-fraud-api-v2
      path: /SeonRestService/fraud-api/v2/
      operations:
      - name: submitfraudcheck
        method: POST
        description: Submit a fraud evaluation request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.SEON_DOCS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: seon-docs-fraud-rest
    port: 8080
    description: REST adapter for SEON API — Fraud. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/seonrestservice/fraud-api/v2
      name: seonrestservice-fraud-api-v2
      description: REST surface for SeonRestService-fraud-api-v2.
      operations:
      - method: POST
        name: submitfraudcheck
        description: Submit a fraud evaluation request
        call: seon-docs-fraud.submitfraudcheck
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: seon-docs-fraud-mcp
    port: 9090
    transport: http
    description: MCP adapter for SEON API — Fraud. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: submit-fraud-evaluation-request
      description: Submit a fraud evaluation request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: seon-docs-fraud.submitfraudcheck
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
