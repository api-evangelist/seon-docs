aid: seon-docs
name: SEON
description: SEON is a fraud prevention and AML compliance platform that provides a modular API architecture for fraud detection,
  identity verification, email enrichment, phone analysis, IP analysis, device fingerprinting, and AML screening. The platform
  enables businesses to combine multiple fraud signals to score risk and prevent fraudulent transactions.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AML Compliance
  - Fraud Prevention
  - Identity Verification
  - Risk Scoring
