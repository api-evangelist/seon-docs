apis:
  - aid: seon-docs:fraud-api
    name: SEON Fraud API
    description: The SEON Fraud API is a modular API that combines email, phone number, IP, BIN, and AML APIs with device fingerprinting
      so you can request and receive enriched data, rules, and scoring in a single API call to detect and prevent fraud.
